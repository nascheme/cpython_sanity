name: Build cpython-asan image
run-name: Build cpython-asan -- ${{ inputs.python_version }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: Version of Python to build (e.g. '3.14.3t' or '3.14t' or '3.15t-dev')
        default: '3.15t-dev'
        type: string
  schedule:
    # 04:02 on Sundays and Wednesdays
    - cron: "02 4 * * SUN,WED"

env:
  python_version: ${{ github.event.inputs.python_version || '3.15t-dev' }}

permissions:
  contents: read
  packages: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Check out the repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Login to ghcr
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
       registry: ghcr.io
       username: ${{ github.actor }}
       password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Compute tags
      run: |
        bash .github/scripts/compute_tags.sh ghcr.io/nascheme/cpython-asan "${{ env.python_version }}" >> $GITHUB_ENV

    - name: Build and push image -- ${{ env.python_version }}
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
       context: .
       push: true
       provenance: false
       file: ./Dockerfile.cpython
       build-args: |
        python_version=${{ env.python_version }}
        config_opts=--with-address-sanitizer
       tags: ${{ env.TAGS }}
